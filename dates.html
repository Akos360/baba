<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Our dates 💕</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script>(function(){var t=localStorage.getItem('baba-theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink: #ff6b9d;
      --soft-pink: #ffc2d8;
      --purple: #c77dff;
      --soft-purple: #e8d5ff;
      --bg: #fff0f5;
      --text: #3d2c4e;
    }

    html, body {
      min-height: 100%;
      font-family: 'Nunito', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: 2rem 1.2rem 4rem;
    }

    h1 {
      font-family: 'Pacifico', cursive;
      color: var(--pink);
      font-size: clamp(2rem, 8vw, 2.8rem);
      text-shadow: 2px 3px 0 var(--soft-pink);
      text-align: center;
      margin-bottom: .3rem;
    }
    .subtitle {
      text-align: center;
      font-size: 1rem;
      font-weight: 600;
      color: #7b5ea7;
      margin-bottom: 1.4rem;
    }

    /* ── Tab bar */
    .tab-bar {
      display: flex;
      gap: .4rem;
      margin-bottom: 1.2rem;
      background: white;
      border-radius: 18px;
      padding: .4rem;
      box-shadow: 0 4px 16px rgba(199,125,255,.12);
    }
    .tab-btn {
      flex: 1;
      border: none;
      background: transparent;
      border-radius: 13px;
      padding: .65rem .5rem;
      font-family: 'Nunito', sans-serif;
      font-size: .95rem;
      font-weight: 800;
      color: #b088cc;
      cursor: pointer;
      transition: background .2s, color .2s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-btn:active { transform: scale(.96); }
    .tab-btn.active {
      background: linear-gradient(135deg, var(--pink), var(--purple));
      color: white;
      box-shadow: 0 3px 10px rgba(255,107,157,.3);
    }

    /* ── Progress bar */
    .progress-wrap {
      background: white;
      border-radius: 50px;
      box-shadow: 0 4px 16px rgba(199,125,255,.15);
      padding: .8rem 1.2rem;
      margin-bottom: 1.4rem;
      display: flex;
      align-items: center;
      gap: .8rem;
    }
    .progress-bar-bg {
      flex: 1;
      height: 10px;
      background: var(--soft-purple);
      border-radius: 50px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--pink), var(--purple));
      border-radius: 50px;
      transition: width .4s ease;
      width: 0%;
    }
    .progress-label {
      font-weight: 800;
      font-size: .95rem;
      color: var(--purple);
      white-space: nowrap;
    }

    /* ── Date list */
    #date-list { display: flex; flex-direction: column; gap: .7rem; }

    .date-item {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(199,125,255,.12);
      display: flex;
      align-items: center;
      gap: .9rem;
      padding: .9rem 1rem;
      cursor: pointer;
      transition: transform .12s, box-shadow .12s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .date-item:active { transform: scale(.97); }
    .date-item.done {
      background: linear-gradient(135deg, #fff0f9, #f3e8ff);
    }

    .check-box {
      width: 26px;
      height: 26px;
      min-width: 26px;
      border-radius: 8px;
      border: 2.5px solid var(--soft-purple);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      color: transparent;
      transition: background .2s, border-color .2s, color .2s;
      background: white;
    }
    .date-item.done .check-box {
      background: linear-gradient(135deg, var(--pink), var(--purple));
      border-color: transparent;
      color: white;
    }

    .date-text {
      flex: 1;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
      transition: color .2s;
    }
    .date-item.done .date-text {
      color: #b088cc;
      text-decoration: line-through;
      text-decoration-color: var(--soft-pink);
    }

    .date-emoji { font-size: 1.4rem; }

    .del-btn {
      background: none;
      border: none;
      color: #ddc8f0;
      font-size: 1.1rem;
      cursor: pointer;
      padding: .2rem .3rem;
      border-radius: 8px;
      line-height: 1;
      transition: color .15s, background .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .del-btn:hover, .del-btn:active { color: var(--pink); background: #fff0f5; }

    /* ── Add row (shared) */
    .add-wrap {
      margin-top: 1.4rem;
      background: white;
      border-radius: 20px;
      box-shadow: 0 4px 16px rgba(199,125,255,.15);
      padding: .9rem 1rem;
      display: flex;
      gap: .6rem;
      align-items: center;
    }
    .add-wrap input {
      flex: 1;
      border: none;
      outline: none;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      background: transparent;
    }
    .add-wrap input::placeholder { color: #cbb8de; font-weight: 600; }
    .add-btn {
      background: linear-gradient(135deg, var(--pink), var(--purple));
      color: white;
      border: none;
      border-radius: 12px;
      width: 36px;
      height: 36px;
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform .15s, opacity .15s;
    }
    .add-btn:active { transform: scale(.9); }
    .add-btn:disabled { opacity: .55; cursor: default; transform: none; }

    .all-done {
      display: none;
      text-align: center;
      font-family: 'Pacifico', cursive;
      font-size: 1.3rem;
      color: var(--pink);
      text-shadow: 1px 2px 0 var(--soft-pink);
      margin-top: 1.6rem;
    }

    /* ── Loading state */
    .loading {
      text-align: center;
      color: #c0a8d8;
      font-weight: 700;
      padding: 2rem 0;
    }

    /* ── Movie list */
    #movie-list { display: flex; flex-direction: column; gap: .7rem; }

    .movie-item {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(199,125,255,.12);
      display: flex;
      align-items: center;
      gap: .9rem;
      padding: .7rem;
      overflow: hidden;
      cursor: pointer;
      transition: transform .12s, box-shadow .12s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .movie-item:active { transform: scale(.97); }
    .movie-item.watched {
      background: linear-gradient(135deg, #fff0f9, #f3e8ff);
    }
    .movie-item.watched .movie-poster { opacity: .6; }
    .movie-item.watched .movie-title {
      color: #b088cc;
      text-decoration: line-through;
      text-decoration-color: var(--soft-pink);
    }
    .movie-item.watched .movie-year { color: #cbb8de; }
    .movie-item.watched .check-box {
      background: linear-gradient(135deg, var(--pink), var(--purple));
      border-color: transparent;
      color: white;
    }

    .movie-poster {
      width: 55px;
      height: 83px;
      object-fit: cover;
      border-radius: 10px;
      flex-shrink: 0;
      background: var(--soft-purple);
      display: block;
    }

    .movie-poster-placeholder {
      width: 55px;
      height: 83px;
      border-radius: 10px;
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--soft-pink), var(--soft-purple));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }

    .movie-info {
      flex: 1;
      min-width: 0;
    }

    .movie-title {
      font-size: 1rem;
      font-weight: 800;
      color: var(--text);
      line-height: 1.3;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .movie-year {
      font-size: .85rem;
      color: #b088cc;
      font-weight: 600;
      margin-top: .25rem;
    }

    .movie-msg {
      text-align: center;
      font-size: .9rem;
      font-weight: 700;
      color: var(--pink);
      margin-top: .8rem;
      min-height: 1.3rem;
    }

    /* ── Autocomplete suggestions */
    .suggestions-box {
      display: none;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 28px rgba(199,125,255,.22);
      margin-top: .4rem;
      overflow: hidden;
    }
    .suggestions-box.open { display: block; }
    .suggestion-item {
      display: flex;
      align-items: center;
      gap: .8rem;
      padding: .6rem .9rem;
      cursor: pointer;
      border-bottom: 1px solid #f5ecff;
      transition: background .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .suggestion-item:last-child { border-bottom: none; }
    .suggestion-item:hover, .suggestion-item:active { background: #fef6ff; }
    .suggestion-thumb {
      width: 36px;
      height: 54px;
      object-fit: cover;
      border-radius: 7px;
      flex-shrink: 0;
      background: var(--soft-purple);
      display: block;
    }
    .suggestion-thumb-ph {
      width: 36px;
      height: 54px;
      border-radius: 7px;
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--soft-pink), var(--soft-purple));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }
    .suggestion-info { flex: 1; min-width: 0; }
    .suggestion-title {
      font-size: .92rem;
      font-weight: 800;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .suggestion-meta {
      font-size: .78rem;
      color: #b088cc;
      font-weight: 600;
      margin-top: .1rem;
    }

    /* ── Confirm modal */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(61,44,78,.4);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .modal-backdrop.open { display: flex; }
    .modal-card {
      background: white;
      border-radius: 24px;
      padding: 2rem 1.6rem 1.6rem;
      max-width: 300px;
      width: 100%;
      box-shadow: 0 16px 48px rgba(199,125,255,.3);
      text-align: center;
      animation: modalPop .22s cubic-bezier(.34,1.56,.64,1) forwards;
    }
    @keyframes modalPop {
      from { transform: scale(.8); opacity: 0; }
      to   { transform: scale(1);  opacity: 1; }
    }
    .modal-title {
      font-family: 'Pacifico', cursive;
      font-size: 1.35rem;
      color: var(--pink);
      text-shadow: 1px 2px 0 var(--soft-pink);
      margin-bottom: .45rem;
    }
    .modal-sub {
      font-size: .9rem;
      font-weight: 600;
      color: #b088cc;
      margin-bottom: 1.5rem;
    }
    .modal-btns { display: flex; gap: .7rem; }
    .modal-btn {
      flex: 1;
      border: none;
      border-radius: 14px;
      padding: .75rem;
      font-family: 'Nunito', sans-serif;
      font-size: .95rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform .12s;
      -webkit-tap-highlight-color: transparent;
    }
    .modal-btn:active { transform: scale(.95); }
    .modal-cancel  { background: var(--soft-purple); color: var(--purple); }
    .modal-confirm { background: linear-gradient(135deg, var(--pink), var(--purple)); color: white; }

    /* ── Dice button */
    .dice-btn {
      width: 100%;
      border: none;
      background: white;
      border-radius: 16px;
      padding: .7rem 1rem;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      color: var(--purple);
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(199,125,255,.12);
      margin-bottom: 1.2rem;
      transition: transform .12s, color .15s, background .15s;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .4rem;
    }
    .dice-btn:hover { background: #fef6ff; }
    .dice-btn:active { transform: scale(.97); color: var(--pink); }

    /* ── Random pick highlight */
    @keyframes selectPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,107,157,.5); }
      50%       { box-shadow: 0 0 0 6px rgba(255,107,157,.2); }
    }
    .selected {
      outline: 2.5px solid var(--pink);
      outline-offset: 2px;
      animation: selectPulse .6s ease 2;
    }

    /* ── Date photo */
    .photo-btn {
      background: none;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      padding: .2rem .3rem;
      border-radius: 8px;
      opacity: 0;
      transition: opacity .15s;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
      line-height: 1;
    }
    .date-item:hover .photo-btn { opacity: .55; }
    .photo-btn:hover, .photo-btn:active { opacity: 1 !important; }
    @media (hover: none) { .photo-btn { opacity: .4; } }

    .date-thumb {
      width: 38px;
      height: 38px;
      object-fit: cover;
      border-radius: 9px;
      flex-shrink: 0;
      cursor: pointer;
      display: block;
      transition: transform .12s;
      box-shadow: 0 2px 8px rgba(199,125,255,.2);
    }
    .date-thumb:active { transform: scale(.9); }

    /* Lightbox */
    .photo-lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.9);
      z-index: 400;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1.2rem;
    }
    .photo-lightbox.open { display: flex; }
    .lightbox-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      max-width: min(100%, 480px);
    }
    .lightbox-inner img {
      max-width: 100%;
      max-height: 72vh;
      border-radius: 16px;
      object-fit: contain;
      display: block;
    }
    .lightbox-actions { display: flex; gap: .6rem; }
    .lightbox-btn {
      border: none;
      border-radius: 50px;
      padding: .55rem 1.1rem;
      font-family: 'Nunito', sans-serif;
      font-size: .88rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform .12s;
      -webkit-tap-highlight-color: transparent;
    }
    .lightbox-btn:active { transform: scale(.94); }
    .lb-change { background: rgba(255,255,255,.18); color: white; }
    .lb-remove { background: rgba(255,107,157,.85); color: white; }
    .lb-close  { background: rgba(255,255,255,.1); color: rgba(255,255,255,.65); }

    /* ── Theme toggle button */
    .theme-toggle {
      position: fixed;
      top: .9rem;
      right: .9rem;
      z-index: 300;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: white;
      box-shadow: 0 2px 14px rgba(199,125,255,.3);
      font-size: 1.15rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .15s, background .2s;
      -webkit-tap-highlight-color: transparent;
    }
    .theme-toggle:active { transform: scale(.88); }

    /* ── Dark mode */
    [data-theme="dark"] {
      --bg: #120c1e;
      --text: #eddeff;
      --soft-purple: #2e1f4a;
      --soft-pink: #3a1a2e;
    }
    [data-theme="dark"] .subtitle { color: #b088cc; }
    [data-theme="dark"] .tab-bar,
    [data-theme="dark"] .progress-wrap,
    [data-theme="dark"] .add-wrap,
    [data-theme="dark"] .dice-btn,
    [data-theme="dark"] .modal-card,
    [data-theme="dark"] .suggestions-box,
    [data-theme="dark"] .date-item,
    [data-theme="dark"] .movie-item,
    [data-theme="dark"] .check-box,
    [data-theme="dark"] .theme-toggle { background: #1e1332; }
    [data-theme="dark"] .date-item.done,
    [data-theme="dark"] .movie-item.watched { background: linear-gradient(135deg, #2a1428, #1f1040); }
    [data-theme="dark"] .suggestion-item { border-bottom-color: #2e1f4a; }
    [data-theme="dark"] .suggestion-item:hover,
    [data-theme="dark"] .suggestion-item:active { background: #281a40; }
    [data-theme="dark"] .del-btn:hover,
    [data-theme="dark"] .del-btn:active { background: #281a40; }
    [data-theme="dark"] .tab-btn { color: #9070b8; }
    [data-theme="dark"] .modal-backdrop { background: rgba(0,0,0,.72); }
    [data-theme="dark"] .all-done { text-shadow: none; }
  </style>
</head>
<body>

<button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>

<div class="wrapper">
  <img src="img/yippe.jpg" alt="" style="width:100%; border-radius:20px; display:block; margin-bottom:1.2rem;" />
  <h1>Our dates 🗓️</h1>
  <p class="subtitle">tick them off as we go 💕</p>

  <!-- Tab bar -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-dates" onclick="switchTab('dates')">🗓️ Dates</button>
    <button class="tab-btn" id="tab-movies" onclick="switchTab('movies')">🎬 Movies</button>
  </div>
  <button class="dice-btn" id="diceBtn" onclick="randomPick()">🎲 Fuck it we Ball!</button>

  <!-- Hidden photo file input -->
  <input type="file" id="photoInput" accept="image/*" style="display:none">

  <!-- Photo lightbox -->
  <div class="photo-lightbox" id="photoLightbox" onclick="closeLightbox()">
    <div class="lightbox-inner" onclick="event.stopPropagation()">
      <img id="lightboxImg" src="" alt="date photo" />
      <div class="lightbox-actions">
        <button class="lightbox-btn lb-change" onclick="changePhoto()">📷 Change</button>
        <button class="lightbox-btn lb-remove" onclick="removePhoto()">✕ Remove</button>
        <button class="lightbox-btn lb-close"  onclick="closeLightbox()">Close</button>
      </div>
    </div>
  </div>

  <!-- Confirm remove modal -->
  <div class="modal-backdrop" id="modalBackdrop" onclick="closeModal()">
    <div class="modal-card" onclick="event.stopPropagation()">
      <p class="modal-title">Remove this? 🥺</p>
      <p class="modal-sub">This can't be undone!</p>
      <div class="modal-btns">
        <button class="modal-btn modal-cancel" onclick="closeModal()">Keep it 💕</button>
        <button class="modal-btn modal-confirm" onclick="confirmDelete()">Remove ✕</button>
      </div>
    </div>
  </div>

  <!-- ── DATES SECTION ── -->
  <div id="section-dates">
    <div class="progress-wrap">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
      <span class="progress-label" id="progressLabel">… / …</span>
    </div>

    <div id="date-list">
      <p class="loading">loading… 💕</p>
    </div>

    <div class="add-wrap">
      <input type="text" id="newDateInput" placeholder="Add a new date idea…" maxlength="60" />
      <button class="add-btn" onclick="addDate()">+</button>
    </div>

    <div class="all-done" id="allDone">we did everything!! 🎉 time to add more 😏</div>
  </div>

  <!-- ── MOVIES SECTION ── -->
  <div id="section-movies" style="display:none">
    <div class="progress-wrap">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="movieProgressFill"></div>
      </div>
      <span class="progress-label" id="movieProgressLabel">… / …</span>
    </div>

    <div id="movie-list">
      <p class="loading">loading… 🎬</p>
    </div>

    <div class="add-wrap" id="movieAddWrap">
      <input type="text" id="newMovieInput" placeholder="Search a movie to add…" maxlength="80" autocomplete="off" />
      <button class="add-btn" id="movieAddBtn" onclick="addMovie()">+</button>
    </div>
    <div class="suggestions-box" id="movieSuggestions"></div>
    <div class="movie-msg" id="movieMsg"></div>
    <div class="all-done" id="movieAllDone">we watched everything!! 🎉 time to add more 😏</div>
  </div>
</div>

<!-- Firebase compat CDN -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
  // ── OMDB API key — get your free one at https://www.omdbapi.com/apikey.aspx
  const OMDB_KEY = '3e54eff';

  // ── Firebase init
  const firebaseConfig = {
    apiKey: "AIzaSyA_ObhbiCf-dtbEKiqhYER1477bgP5fp7k",
    authDomain: "baba-14bcd.firebaseapp.com",
    projectId: "baba-14bcd",
    storageBucket: "baba-14bcd.firebasestorage.app",
    messagingSenderId: "906012500837",
    appId: "1:906012500837:web:f2556643ef88d9e0f6778c"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const col = db.collection('dates');
  const moviesCol = db.collection('movies');

  // ── Tab switching
  function switchTab(tab) {
    document.getElementById('section-dates').style.display  = tab === 'dates'  ? 'block' : 'none';
    document.getElementById('section-movies').style.display = tab === 'movies' ? 'block' : 'none';
    document.getElementById('tab-dates').classList.toggle('active',  tab === 'dates');
    document.getElementById('tab-movies').classList.toggle('active', tab === 'movies');
  }

  // ── Default dates to seed on first load
  const defaults = [
    { text: 'Ikea date',               emoji: '🛒',  done: false },
    { text: 'Adult play centre date',  emoji: '🎮',  done: false },
    { text: 'Billiard date',           emoji: '🎱',  done: true  },
    { text: 'Hike date',               emoji: '🥾',  done: false },
    { text: 'Sushi by the river date', emoji: '🍣',  done: false },
    { text: 'Late night drive date',   emoji: '🚗',  done: true  },
    { text: 'Clay date',               emoji: '🏺',  done: false },
    { text: 'Bowling date',            emoji: '🎳',  done: false },
    { text: 'Aquarium date',           emoji: '🐠',  done: false },
    { text: 'Cuisine date',            emoji: '🍽️', done: true  },
    { text: 'Painting date',           emoji: '🎨',  done: false },
    { text: 'Board game date',         emoji: '🎲',  done: false },
    { text: 'Escape room date',        emoji: '🔐',  done: false },
    { text: 'Lego date',               emoji: '🧱',  done: true  },
    { text: 'Basketball match date',   emoji: '🏀',  done: true  },
    { text: 'Minigolf date',           emoji: '⛳',  done: false },
  ];

  // ── Seed dates if empty
  col.limit(1).get().then(snap => {
    if (snap.empty) {
      const batch = db.batch();
      defaults.forEach((d, i) => batch.set(col.doc(), { ...d, order: i }));
      batch.commit();
    }
  });

  // ── Real-time listener — dates
  col.orderBy('order').onSnapshot(snap => {
    const list = document.getElementById('date-list');
    list.innerHTML = '';
    snap.forEach(doc => {
      const d = doc.data();
      const el = document.createElement('div');
      el.className = 'date-item' + (d.done ? ' done' : '');
      el.innerHTML = `
        <span class="check-box">✓</span>
        <span class="date-text">${esc(d.text)}</span>
        <span class="date-emoji">${d.emoji}</span>
        <button class="del-btn" title="Remove">✕</button>
      `;

      // Photo thumbnail or camera button (inserted before del-btn)
      const delBtn = el.querySelector('.del-btn');
      if (d.photo && d.photo.startsWith('data:image/')) {
        const thumb = document.createElement('img');
        thumb.className = 'date-thumb';
        thumb.alt = 'memory';
        thumb.src = d.photo;
        thumb.onclick = e => { e.stopPropagation(); openLightbox(d.photo, doc.id); };
        el.insertBefore(thumb, delBtn);
      } else {
        const photoBtn = document.createElement('button');
        photoBtn.className = 'photo-btn';
        photoBtn.title = 'Add photo memory';
        photoBtn.textContent = '📷';
        photoBtn.onclick = e => { e.stopPropagation(); openPhotoPicker(doc.id); };
        el.insertBefore(photoBtn, delBtn);
      }

      el.querySelector('.del-btn').onclick = e => { e.stopPropagation(); askRemove(() => col.doc(doc.id).delete()); };
      el.onclick = () => col.doc(doc.id).update({ done: !d.done });
      list.appendChild(el);
    });
    updateProgress(snap);
  });

  function updateProgress(snap) {
    let total = 0, done = 0;
    snap.forEach(doc => { total++; if (doc.data().done) done++; });
    document.getElementById('progressFill').style.width = total ? (done / total * 100) + '%' : '0%';
    document.getElementById('progressLabel').textContent = done + ' / ' + total;
    document.getElementById('allDone').style.display = (total && done === total) ? 'block' : 'none';
  }

  // ── Add new date
  function addDate() {
    const input = document.getElementById('newDateInput');
    const text = input.value.trim();
    if (!text) return;
    col.get().then(snap => col.add({ text, emoji: '💕', done: false, order: snap.size }));
    input.value = '';
  }
  document.getElementById('newDateInput').addEventListener('keydown', e => { if (e.key === 'Enter') addDate(); });

  // ── Real-time listener — movies
  moviesCol.orderBy('order').onSnapshot(snap => {
    const list = document.getElementById('movie-list');
    list.innerHTML = '';
    if (snap.empty) {
      const p = document.createElement('p');
      p.className = 'loading';
      p.textContent = 'No movies yet 🎬 add some!';
      list.appendChild(p);
      updateMovieProgress(snap);
      return;
    }
    snap.forEach(doc => {
      const m = doc.data();
      const el = document.createElement('div');
      el.className = 'movie-item' + (m.watched ? ' watched' : '');

      // Poster
      if (m.poster) {
        const img = document.createElement('img');
        img.className = 'movie-poster';
        img.alt = m.title;
        img.loading = 'lazy';
        img.onerror = () => img.replaceWith(makePosterPlaceholder());
        img.src = m.poster;
        el.appendChild(img);
      } else {
        el.appendChild(makePosterPlaceholder());
      }

      // Info
      const info = document.createElement('div');
      info.className = 'movie-info';
      const titleEl = document.createElement('div');
      titleEl.className = 'movie-title';
      titleEl.textContent = m.title;
      info.appendChild(titleEl);
      if (m.year) {
        const yearEl = document.createElement('div');
        yearEl.className = 'movie-year';
        yearEl.textContent = m.year;
        info.appendChild(yearEl);
      }
      el.appendChild(info);

      // Checkbox
      const checkBox = document.createElement('span');
      checkBox.className = 'check-box';
      checkBox.textContent = '✓';
      el.appendChild(checkBox);

      // Delete
      const delBtn = document.createElement('button');
      delBtn.className = 'del-btn';
      delBtn.title = 'Remove';
      delBtn.textContent = '✕';
      delBtn.onclick = e => { e.stopPropagation(); askRemove(() => moviesCol.doc(doc.id).delete()); };
      el.appendChild(delBtn);

      el.onclick = () => moviesCol.doc(doc.id).update({ watched: !m.watched });
      list.appendChild(el);
    });
    updateMovieProgress(snap);
  });

  function updateMovieProgress(snap) {
    let total = 0, watched = 0;
    snap.forEach(doc => { total++; if (doc.data().watched) watched++; });
    document.getElementById('movieProgressFill').style.width = total ? (watched / total * 100) + '%' : '0%';
    document.getElementById('movieProgressLabel').textContent = watched + ' / ' + total;
    document.getElementById('movieAllDone').style.display = (total && watched === total) ? 'block' : 'none';
  }

  function makePosterPlaceholder() {
    const ph = document.createElement('div');
    ph.className = 'movie-poster-placeholder';
    ph.textContent = '🎬';
    return ph;
  }

  // ── Autocomplete suggestions
  let suggestTimer = null;
  let suggestResults = [];

  document.getElementById('newMovieInput').addEventListener('input', e => {
    clearTimeout(suggestTimer);
    const q = e.target.value.trim();
    if (q.length < 2) { hideSuggestions(); return; }
    suggestTimer = setTimeout(() => fetchSuggestions(q), 350);
  });

  document.getElementById('newMovieInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      if (suggestResults.length) pickSuggestion(suggestResults[0]);
      else addMovie();
    } else if (e.key === 'Escape') {
      hideSuggestions();
    }
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('#movieAddWrap') && !e.target.closest('#movieSuggestions')) hideSuggestions();
  });

  async function fetchSuggestions(q) {
    if (OMDB_KEY === 'YOUR_API_KEY_HERE') return;
    try {
      const res = await fetch(`https://www.omdbapi.com/?s=${encodeURIComponent(q)}&type=movie&apikey=${OMDB_KEY}`);
      const data = await res.json();
      if (data.Response === 'True') {
        suggestResults = data.Search.slice(0, 6);
        renderSuggestions(suggestResults);
      } else {
        hideSuggestions();
      }
    } catch { hideSuggestions(); }
  }

  function renderSuggestions(results) {
    const box = document.getElementById('movieSuggestions');
    box.innerHTML = '';
    results.forEach(r => {
      const item = document.createElement('div');
      item.className = 'suggestion-item';

      if (r.Poster && r.Poster !== 'N/A') {
        const img = document.createElement('img');
        img.className = 'suggestion-thumb';
        img.src = r.Poster;
        img.alt = r.Title;
        img.onerror = () => img.replaceWith(makeSuggestionThumb());
        item.appendChild(img);
      } else {
        item.appendChild(makeSuggestionThumb());
      }

      const info = document.createElement('div');
      info.className = 'suggestion-info';
      const t = document.createElement('div');
      t.className = 'suggestion-title';
      t.textContent = r.Title;
      const m = document.createElement('div');
      m.className = 'suggestion-meta';
      m.textContent = r.Year || '';
      info.appendChild(t);
      info.appendChild(m);
      item.appendChild(info);

      item.onclick = () => pickSuggestion(r);
      box.appendChild(item);
    });
    box.classList.add('open');
  }

  function hideSuggestions() {
    document.getElementById('movieSuggestions').classList.remove('open');
    suggestResults = [];
  }

  function makeSuggestionThumb() {
    const ph = document.createElement('div');
    ph.className = 'suggestion-thumb-ph';
    ph.textContent = '🎬';
    return ph;
  }

  async function pickSuggestion(r) {
    hideSuggestions();
    document.getElementById('newMovieInput').value = '';
    const btn = document.getElementById('movieAddBtn');
    btn.textContent = '…';
    btn.disabled = true;
    try {
      const snap = await moviesCol.get();
      await moviesCol.add({
        title:   r.Title,
        year:    r.Year   || '',
        poster:  r.Poster !== 'N/A' ? r.Poster : '',
        imdbId:  r.imdbID || '',
        order:   snap.size,
        watched: false,
      });
      setMovieMsg('');
    } catch { setMovieMsg('Something went wrong 😭 try again!'); }
    finally { btn.textContent = '+'; btn.disabled = false; }
  }

  // ── Add movie via OMDB (fallback: no suggestion selected)
  async function addMovie() {
    if (suggestResults.length) { pickSuggestion(suggestResults[0]); return; }

    const input = document.getElementById('newMovieInput');
    const title = input.value.trim();
    if (!title) return;

    if (OMDB_KEY === 'YOUR_API_KEY_HERE') {
      setMovieMsg('Add your OMDB API key in the code 🔑 (free at omdbapi.com/apikey.aspx)');
      return;
    }

    const btn = document.getElementById('movieAddBtn');
    btn.textContent = '…';
    btn.disabled = true;
    setMovieMsg('Searching… 🔍');

    try {
      const res = await fetch(`https://www.omdbapi.com/?t=${encodeURIComponent(title)}&apikey=${OMDB_KEY}`);
      const data = await res.json();
      if (data.Response === 'True') {
        const snap = await moviesCol.get();
        await moviesCol.add({
          title:   data.Title,
          year:    data.Year  || '',
          poster:  data.Poster !== 'N/A' ? data.Poster : '',
          imdbId:  data.imdbID || '',
          order:   snap.size,
          watched: false,
        });
        input.value = '';
        setMovieMsg('');
      } else {
        setMovieMsg('Movie not found 😢 try another title!');
      }
    } catch { setMovieMsg('Something went wrong 😭 try again!'); }
    finally { btn.textContent = '+'; btn.disabled = false; }
  }

  function setMovieMsg(msg) {
    document.getElementById('movieMsg').textContent = msg;
  }

  // ── Photo memories
  let currentPhotoDocId = null;
  let lightboxDocId     = null;

  function openPhotoPicker(docId) {
    currentPhotoDocId = docId;
    document.getElementById('photoInput').click();
  }

  document.getElementById('photoInput').addEventListener('change', async e => {
    const file = e.target.files[0];
    e.target.value = '';
    if (!file || !currentPhotoDocId) return;
    const docId = currentPhotoDocId;
    currentPhotoDocId = null;
    try {
      const base64 = await resizePhoto(file, 800, 0.72);
      await col.doc(docId).update({ photo: base64 });
    } catch (err) { console.error('Photo upload failed', err); }
  });

  function resizePhoto(file, maxWidth, quality) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        URL.revokeObjectURL(url);
        const scale = Math.min(1, maxWidth / img.width);
        const w = Math.round(img.width  * scale);
        const h = Math.round(img.height * scale);
        const canvas = document.createElement('canvas');
        canvas.width  = w;
        canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = url;
    });
  }

  function openLightbox(src, docId) {
    lightboxDocId = docId;
    document.getElementById('lightboxImg').src = src;
    document.getElementById('photoLightbox').classList.add('open');
  }
  function closeLightbox() {
    document.getElementById('photoLightbox').classList.remove('open');
    lightboxDocId = null;
  }
  function removePhoto() {
    if (!lightboxDocId) return;
    col.doc(lightboxDocId).update({ photo: firebase.firestore.FieldValue.delete() });
    closeLightbox();
  }
  function changePhoto() {
    const docId = lightboxDocId;
    closeLightbox();
    if (docId) openPhotoPicker(docId);
  }

  // ── Theme toggle
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    document.getElementById('themeToggle').textContent = theme === 'dark' ? '☀️' : '🌙';
  }
  function toggleTheme() {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    localStorage.setItem('baba-theme', next);
    applyTheme(next);
  }
  applyTheme(localStorage.getItem('baba-theme') || 'light');

  // ── Escape HTML (for dates innerHTML)
  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Confirm modal
  let pendingDelete = null;
  function askRemove(fn) {
    pendingDelete = fn;
    document.getElementById('modalBackdrop').classList.add('open');
  }
  function confirmDelete() {
    if (pendingDelete) pendingDelete();
    closeModal();
  }
  function closeModal() {
    document.getElementById('modalBackdrop').classList.remove('open');
    pendingDelete = null;
  }

  // ── Random pick
  function randomPick() {
    document.querySelectorAll('.selected').forEach(el => el.classList.remove('selected'));

    const isMovies = document.getElementById('section-movies').style.display !== 'none';
    const items = isMovies
      ? [...document.querySelectorAll('#movie-list .movie-item:not(.watched)')]
      : [...document.querySelectorAll('#date-list .date-item:not(.done)')];

    if (!items.length) {
      const btn = document.getElementById('diceBtn');
      const orig = btn.textContent;
      btn.textContent = isMovies ? 'all watched! 🎉' : 'all done! 🎉';
      setTimeout(() => { btn.textContent = orig; }, 1800);
      return;
    }

    const pick = items[Math.floor(Math.random() * items.length)];
    pick.classList.add('selected');
    pick.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
</script>
</body>
</html>
